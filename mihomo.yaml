######### 🚀 锚点定义区域 start #######
# 1. 统一所有功能分流组的可选节点队列
pr:
  &pr {
    type: select,
    proxies:
      [默认, 直连, 香港, 台湾, 日本, 韩国, 新加坡, 美国, 其它地区, 低倍率节点],
  }

# 2. 统一订阅源的高级健康检查参数
p: &p
  type: http
  health-check:
    enable: true
    lazy: true
    url: "https://www.gstatic.com/generate_204"
    interval: 7200
    timeout: 3000

# 3. 自动化策略组基准模板（纯测速）
ut:
  &ut {
    type: url-test,
    tolerance: 70,
    interval: 1200,
    timeout: 3000,
    lazy: true,
    url: "https://www.gstatic.com/generate_204",
    hidden: true,
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png",
  }

# 4. 统一地理位置正则筛选过滤
fhk: &fhk "(?i)(港|香港|hk|hongkong|hong kong)"
ftw: &ftw "(?i)(台|tw|taiwan)"
fjp: &fjp "(?i)(日|jp|japan)"
fkr: &fkr "(?i)(韩|韩国|首尔|kr|korea|south korea)"
fsg: &fsg "(?i)(新|sg|singapore)"
fus: &fus "(?i)(美|us|usa|unitedstates|united states|america|los angeles|silicon valley)"
fot: &fot "(?i)^(?!.*(?:🇭🇰|🇯🇵|🇺🇸|🇸🇬|🇰🇷|🇨🇳|港|hk|hongkong|台|tw|taiwan|日|jp|japan|韩|kr|korea|新|sg|singapore|美|us|unitedstates|官网|重置|到期|剩余|流量|机场|客服|套餐|订阅|版本)).*"
flw: &flw '(?i)^(?!.*(剩|期|流量|已用|节|官|客)).*(0\.[0-9]+(x|倍率|倍)?|低倍)'
######### 🚀 锚点定义区域 end #######

proxy-providers:
  Pr1:
    <<: *p
    url: "填入订阅地址"
    override:
      additional-prefix: "[Pr1]"

  Pr2:
    <<: *p
    url: ""
    override:
      additional-prefix: "[Pr2]"

  Pr3:
    <<: *p
    url: ""
    override:
      additional-prefix: "[Pr3]"

proxies: []

mixed-port: 7890
ipv6: false
allow-lan: true
unified-delay: true
tcp-concurrent: true

# ==================== 📱 手机端移动网络秒切优化 ====================
reset-network-change: true # 当 Wi-Fi 和流量切换时，瞬间重置网络栈，斩断死连接
auto-detect-interface: true # 允许自动检测并适应手机当前活跃的网卡接口
udp-timeout: 15 # 缩短 UDP 超时，强制残留的旧连接快速死掉，逼迫手机走新网络
# ====================================================================

external-controller: 127.0.0.1:9090

# 修复兼容性
external-ui: ./ui
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"
  asn: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"

profile:
  store-selected: true
  store-fake-ip: true

# ==================== sniffer 高级优化 ====================
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true

  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

  skip-domain:
    - "Mijia Cloud"
    - "+.mi.com"
    - "+.xiaomi.com"
    - "+.push.apple.com"
    - "+.qq.com"
    - "+.baidu.com"
    - "120.26.58.213" # 👈 跳过这个 IP 的嗅探

  force-domain: []

# --- DNS 模块 ---
dns:
  enable: true
  ipv6: false # 🔴 保持关闭 IPv6
  listen: :1053
  cache-algorithm: arc
  use-hosts: true
  use-system-hosts: true
  enhanced-mode: fake-ip
  respect-rules: true # 🔴 核心：强制遵守规则，防止开机抢跑
  fake-ip-range: 198.18.0.1/16
  fake-ip-range-v6: "fc00::/18"
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "+.market.xiaomi.com"
    - "geosite:private" # 🟢 纯 Geodata 语法

  default-nameserver:
    - "223.5.5.5"
    - "119.29.29.29"

  proxy-server-nameserver:
    - "https://dns.alidns.com/dns-query"
    - "https://doh.pub/dns-query"

  nameserver:
    - "https://dns.alidns.com/dns-query"
    - "https://doh.pub/dns-query"
    - "https://dns.cloudflare.com/dns-query" # 👈 新增：防污染国外兜底
    - "https://dns.google/dns-query" # 👈 新增：防污染国外兜底

hosts:
  "dns.alidns.com": ["223.5.5.5", "223.6.6.6"]
  "doh.pub": ["1.12.12.12", "120.53.53.53"]
  "dns.cloudflare.com": ["1.1.1.1", "1.0.0.1"]
  "dns.google": ["8.8.8.8", "8.8.4.4"]
  "services.googleapis.cn": ["services.googleapis.com"]
  "+.mcdn.bilivideo.com": ["0.0.0.0"]
  "+.mcdn.bilivideo.cn": ["0.0.0.0"]

proxy-groups:
  # ==================== 后台测速组 ====================
  - { name: "香港-自动选择", <<: *ut, use: [Pr1, Pr2, Pr3], filter: *fhk }
  - { name: "台湾-自动选择", <<: *ut, use: [Pr1, Pr2, Pr3], filter: *ftw }
  - { name: "日本-自动选择", <<: *ut, use: [Pr1, Pr2, Pr3], filter: *fjp }
  - { name: "韩国-自动选择", <<: *ut, use: [Pr1, Pr2, Pr3], filter: *fkr }
  - { name: "新加坡-自动选择", <<: *ut, use: [Pr1, Pr2, Pr3], filter: *fsg }
  - { name: "美国-自动选择", <<: *ut, use: [Pr1, Pr2, Pr3], filter: *fus }
  - { name: "其它地区-自动选择", <<: *ut, use: [Pr1, Pr2, Pr3], filter: *fot }
  - { name: "低倍率-自动选择", <<: *ut, use: [Pr1, Pr2, Pr3], filter: *flw }

  # ==================== 核心组 ====================
  - name: 默认
    type: select
    proxies: [直连, 香港, 台湾, 日本, 韩国, 新加坡, 美国, 其它地区, 低倍率节点]
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Proxy.png"

  - name: 直连
    type: select
    proxies: [DIRECT]
    hidden: true
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Direct.png"

  # ==================== 功能分流 ====================
  - {
      name: 人工智能,
      <<: *pr,
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/ChatGPT.png",
    }
  - {
      name: Google全家桶,
      <<: *pr,
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Google_Search.png",
    }
  - {
      name: YouTube,
      <<: *pr,
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png",
    }
  - {
      name: TikTok,
      <<: *pr,
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/TikTok.png",
    }
  - {
      name: 巴哈姆特,
      <<: *pr,
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Bahamut.png",
    }
  - {
      name: 哔哩哔哩,
      <<: *pr,
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/bilibili.png",
    }
  - {
      name: NETFLIX,
      <<: *pr,
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Netflix.png",
    }
  - {
      name: Spotify,
      <<: *pr,
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Spotify.png",
    }
  - {
      name: Github,
      <<: *pr,
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/GitHub.png",
    }
  - {
      name: 国内,
      <<: *pr,
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/China_Map.png",
    }
  - {
      name: 其他,
      <<: *pr,
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Final.png",
    }

  # ==================== 地区显式选择组 ====================
  - {
      name: 香港,
      type: select,
      use: [Pr1, Pr2, Pr3],
      filter: *fhk,
      proxies: ["香港-自动选择"],
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png",
    }
  - {
      name: 台湾,
      type: select,
      use: [Pr1, Pr2, Pr3],
      filter: *ftw,
      proxies: ["台湾-自动选择"],
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Taiwan.png",
    }
  - {
      name: 日本,
      type: select,
      use: [Pr1, Pr2, Pr3],
      filter: *fjp,
      proxies: ["日本-自动选择"],
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png",
    }
  - {
      name: 韩国,
      type: select,
      use: [Pr1, Pr2, Pr3],
      filter: *fkr,
      proxies: ["韩国-自动选择"],
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Korea.png",
    }
  - {
      name: 新加坡,
      type: select,
      use: [Pr1, Pr2, Pr3],
      filter: *fsg,
      proxies: ["新加坡-自动选择"],
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Singapore.png",
    }
  - {
      name: 美国,
      type: select,
      use: [Pr1, Pr2, Pr3],
      filter: *fus,
      proxies: ["美国-自动选择"],
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png",
    }
  - {
      name: 其它地区,
      type: select,
      use: [Pr1, Pr2, Pr3],
      filter: *fot,
      proxies: ["其它地区-自动选择"],
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png",
    }
  - {
      name: 低倍率节点,
      type: select,
      use: [Pr1, Pr2, Pr3],
      filter: *flw,
      proxies: ["低倍率-自动选择"],
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Available_1.png",
    }

rules:
  # ==================== 局域网（最优先） ====================
  - GEOSITE,private,直连
  - GEOIP,private,直连,no-resolve

  # ==================== AI（置顶拦截，绝不漏包） ====================
  - GEOSITE,openai,人工智能
  - GEOSITE,anthropic,人工智能
  - GEOSITE,xai,人工智能
  - GEOSITE,perplexity,人工智能

  - DOMAIN-SUFFIX,midjourney.com,人工智能
  - DOMAIN-SUFFIX,midjourney.io,人工智能
  - DOMAIN-KEYWORD,midjourney,人工智能

  - DOMAIN-SUFFIX,openrouter.ai,人工智能
  - DOMAIN-SUFFIX,devv.ai,人工智能
  - DOMAIN-SUFFIX,claude.ai,人工智能
  # ==================== TikTok ====================
  - GEOSITE,tiktok,TikTok

  # ==================== 分组服务 ====================
  - GEOSITE,youtube,YouTube
  - GEOSITE,github,Github
  - GEOSITE,netflix,NETFLIX
  - GEOSITE,bahamut,巴哈姆特
  - GEOSITE,bilibili,哔哩哔哩
  - GEOSITE,spotify,Spotify

  # ==================== Google ====================
  - AND,((NETWORK,udp),(GEOSITE,google)),REJECT-DROP

  - GEOSITE,google,Google全家桶
  - GEOIP,google,Google全家桶,no-resolve

  # ==================== 国内外兜底 ====================
  - GEOSITE,CN,国内
  - GEOIP,CN,国内,no-resolve

  - GEOSITE,geolocation-!cn,其他

  - MATCH,其他
