######### 🚀 锚点定义区域 start #######
# 1. 统一所有功能分流组的可选节点队列
pr:
  &pr {
    type: select,
    proxies:
      [默认, 直连, 香港, 台湾, 日本, 韩国, 新加坡, 美国, 其它地区, 低倍率节点],
  }

# 2. 统一订阅源的高级健康检查参数
p: &p
  type: http
  interval: 86400
  health-check:
    enable: true
    lazy: true
    url: "https://www.gstatic.com/generate_204"
    interval: 10800
    timeout: 3000
    concurrency: 5

# 3. 自动化策略组基准模板（纯测速）
ut:
  &ut {
    type: url-test,
    tolerance: 70,
    interval: 1200,
    timeout: 3000,
    lazy: true,
    url: "https://www.gstatic.com/generate_204",
    hidden: true,
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png",
  }

# 4. 统一地理位置正则筛选过滤
fhk: &fhk "(?i)(港|香港|hk|hongkong|hong kong)"
ftw: &ftw "(?i)(台|tw|taiwan)"
fjp: &fjp "(?i)(日|jp|japan)"
fkr: &fkr "(?i)(韩|韩国|首尔|kr|korea|south korea)"
fsg: &fsg "(?i)(新加坡|sg|singapore)"
fus: &fus "(?i)(美|us|usa|unitedstates|united states|america|los angeles|silicon valley)"
fot: &fot "(?i)^(?!.*(?:🇭🇰|🇯🇵|🇺🇸|🇸🇬|🇰🇷|🇨🇳|港|hk|hongkong|台|tw|taiwan|日|jp|japan|韩|kr|korea|新加坡|sg|singapore|美|us|unitedstates|官网|重置|到期|剩余|流量|机场|客服|套餐|订阅|版本)).*"
flw: &flw '(?i)^(?!.*(剩|期|流量|已用|节|官|客)).*(0\.[0-9]+(x|倍率|倍)?|低倍)'
######### 🚀 锚点定义区域 end #######

proxy-providers:
  P1:
    <<: *p
    url: "填入你的订阅链接"
    override:
      additional-prefix: "[P1]"

  P2:
    <<: *p
    url: "填入你的订阅链接"
    override:
      additional-prefix: "[P2]"

  P3:
    <<: *p
    url: "填入你的订阅链接"
    override:
      additional-prefix: "[P3]"

proxies: []

mixed-port: 7890
ipv6: false
allow-lan: true
unified-delay: true
tcp-concurrent: true
find-process-mode: strict

# ==================== 📱 手机端移动网络秒切优化 ====================
reset-network-change: true # 当 Wi-Fi 和流量切换时，瞬间重置网络栈，斩断死连接
auto-detect-interface: true # 允许自动检测并适应手机当前活跃的网卡接口
udp-timeout: 30 # 缩短 UDP 超时，强制残留的旧连接快速死掉，逼迫手机走新网络
tcp-keep-alive-idle: 600
keep-alive-interval: 60
# ==============================================================

external-controller: 127.0.0.1:9090

# 修复兼容性
external-ui: ./ui
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

