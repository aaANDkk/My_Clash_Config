profile:
  store-selected: true
  store-fake-ip: true

# ==================== sniffer 高级优化 ====================
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true

  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

  skip-domain:
    - "Mijia Cloud"
    - "+.mi.com"
    - "+.xiaomi.com"
    - "+.push.apple.com"
    - "+.qq.com"
    - "+.baidu.com"
    - "120.26.58.213" # 👈 跳过这个 IP 的嗅探

  force-domain: []

# --- DNS 模块 ---
dns:
  enable: true
  ipv6: false # 🔴 保持关闭 IPv6
  listen: :1053
  cache-algorithm: arc
  use-hosts: true
  use-system-hosts: true
  enhanced-mode: fake-ip
  respect-rules: true # 🔴 核心：强制遵守规则，防止开机抢跑
  fake-ip-range: 198.18.0.1/16
  fake-ip-range-v6: "fc00::/18"
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "+.market.xiaomi.com"
    - "rule-set:private" # 🟢 修正为规则集语法

  default-nameserver:
    - "223.5.5.5"
    - "119.29.29.29"

  proxy-server-nameserver:
    - "https://dns.alidns.com/dns-query"
    - "https://doh.pub/dns-query"

  nameserver:
    - "https://dns.cloudflare.com/dns-query#默认"
    - "https://dns.google/dns-query#默认"

  nameserver-policy:
    "rule-set:cn":
      - "https://dns.alidns.com/dns-query"
      - "https://doh.pub/dns-query"

hosts:
  "dns.alidns.com": ["223.5.5.5", "223.6.6.6"]
  "doh.pub": ["1.12.12.12", "120.53.53.53"]
  "dns.cloudflare.com": ["1.1.1.1", "1.0.0.1"]
  "dns.google": ["8.8.8.8", "8.8.4.4"]
  "services.googleapis.cn": ["services.googleapis.com"]
  "+.mcdn.bilivideo.com": ["0.0.0.0"]
  "+.mcdn.bilivideo.cn": ["0.0.0.0"]

proxy-groups:
  # ==================== 后台测速组 ====================
  - { name: "香港-自动选择", <<: *ut, use: [P1, P2, P3], filter: *fhk }
  - { name: "台湾-自动选择", <<: *ut, use: [P1, P2, P3], filter: *ftw }
  - { name: "日本-自动选择", <<: *ut, use: [P1, P2, P3], filter: *fjp }
  - { name: "韩国-自动选择", <<: *ut, use: [P1, P2, P3], filter: *fkr }
  - { name: "新加坡-自动选择", <<: *ut, use: [P1, P2, P3], filter: *fsg }
  - { name: "美国-自动选择", <<: *ut, use: [P1, P2, P3], filter: *fus }
  - { name: "其它地区-自动选择", <<: *ut, use: [P1, P2, P3], filter: *fot }
  - { name: "低倍率-自动选择", <<: *ut, use: [P1, P2, P3], filter: *flw }

  # ==================== 核心组 ====================
  - name: 默认
    type: select
    proxies: [直连, 香港, 台湾, 日本, 韩国, 新加坡, 美国, 其它地区, 低倍率节点]
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Proxy.png"

  - name: 直连
    type: select
    proxies: [DIRECT]
    hidden: true
    icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Direct.png"

  # ==================== 功能分流 ====================
  - {
      name: 人工智能,
      <<: *pr,
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/ChatGPT.png",
    }
  - {
      name: Google全家桶,
      <<: *pr,
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Google_Search.png",
    }
  - {
      name: YouTube,
      <<: *pr,
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/YouTube.png",
    }
  - {
      name: TikTok,
      <<: *pr,
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/TikTok.png",
    }
  - {
      name: 巴哈姆特,
      <<: *pr,
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Bahamut.png",
    }
  - {
      name: 哔哩哔哩,
      <<: *pr,
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/bilibili.png",
    }
  - {
      name: NETFLIX,
      <<: *pr,
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Netflix.png",
    }
  - {
      name: Spotify,
      <<: *pr,
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Spotify.png",
    }
  - {
      name: Github,
      <<: *pr,
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/GitHub.png",
    }
  - {
      name: 其他,
      <<: *pr,
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Final.png",
    }

  # ==================== 地区显式选择组 ====================
  - {
      name: 香港,
      type: select,
      use: [P1, P2, P3],
      filter: *fhk,
      proxies: ["香港-自动选择"],
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png",
    }
  - {
      name: 台湾,
      type: select,
      use: [P1, P2, P3],
      filter: *ftw,
      proxies: ["台湾-自动选择"],
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Taiwan.png",
    }
  - {
      name: 日本,
      type: select,
      use: [P1, P2, P3],
      filter: *fjp,
      proxies: ["日本-自动选择"],
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png",
    }
  - {
      name: 韩国,
      type: select,
      use: [P1, P2, P3],
      filter: *fkr,
      proxies: ["韩国-自动选择"],
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Korea.png",
    }
  - {
      name: 新加坡,
      type: select,
      use: [P1, P2, P3],
      filter: *fsg,
      proxies: ["新加坡-自动选择"],
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Singapore.png",
    }
  - {
      name: 美国,
      type: select,
      use: [P1, P2, P3],
      filter: *fus,
      proxies: ["美国-自动选择"],
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png",
    }
  - {
      name: 其它地区,
      type: select,
      use: [P1, P2, P3],
      filter: *fot,
      proxies: ["其它地区-自动选择"],
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png",
    }
  - {
      name: 低倍率节点,
      type: select,
      use: [P1, P2, P3],
      filter: *flw,
      proxies: ["低倍率-自动选择"],
      icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Available_1.png",
    }

# --- 精简优化的路由规则 ---
rules:
  # ==================== 🔒 私有网络与局域网直连 ====================
  - RULE-SET,private,直连
  - DOMAIN,fsend.cn,直连 # 手动直连域名提升至最顶层，确保万无一失

  # ==================== 📝 手动附加域名分流 ====================
  # 手动精确规则移至大规则集上方，防止被覆盖，且方便以后随时调整策略组
  - DOMAIN-SUFFIX,openrouter.ai,人工智能
  - DOMAIN-SUFFIX,devv.ai,人工智能
  - DOMAIN-SUFFIX,claude.ai,人工智能

  # ==================== 🚫 阻断 Google UDP/QUIC 流量 ====================
  # 标准的 Mihomo (Clash Meta) 逻辑组合语法，完美阻断 QUIC 迫使降级 TCP
  - AND,((NETWORK,udp),(DST-PORT,443),(RULE-SET,google)),REJECT-DROP

  # ==================== 🤖 核心代理规则（域名规则集） ====================
  - RULE-SET,youtube,YouTube
  - RULE-SET,google,Google全家桶
  - RULE-SET,ai,人工智能
  - RULE-SET,tiktok,TikTok
  - RULE-SET,bahamut,巴哈姆特
  - RULE-SET,bilibili,哔哩哔哩
  - RULE-SET,netflix,NETFLIX
  - RULE-SET,spotify,Spotify
  - RULE-SET,github,Github

  # ==================== 🌐 精准海外 IP 拦截防御 ====================
  # 🟢 必须带 no-resolve：如果是未知域名流量直接跳过，防止本地 DNS 解析被墙污染或卡顿
  - RULE-SET,google_ip,Google全家桶,no-resolve

  # ==================== 🛡️ 墙内安全防线与终极兜底 ====================
  - RULE-SET,gfw,默认 # 明确在墙外的冷门网站，优先送去代理
  - RULE-SET,cn,直连 # 常见国内域名，直接放行直连

  # 🟢 坚决不带 no-resolve：漏网的国内冷门域名走到这里，触发本地 DNS 解析
  # 如果解析出是国内 IP 就直连；如果不是，就漏给下一行的 MATCH 走代理
  - RULE-SET,cn_ip,直连

  - MATCH,其他 # 剩下的所有绝对未知流量，完美进入代理兜底
